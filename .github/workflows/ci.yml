name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Installs the toolchain pinned in rust-toolchain.toml, including the
      # rustfmt/clippy components and the wasm32 target listed there.
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all

  wasm:
    name: wasm-core build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      # Guards the WASM-safety of cohors-core from day one.
      - name: Build core for wasm32
        run: cargo build -p cohors-core --target wasm32-unknown-unknown

  windows-build:
    name: windows build (best-effort)
    runs-on: windows-latest
    # Windows is best-effort for v0.1 (the open/editor integration and the
    # git-CLI test fixtures are tuned for Unix), so don't block CI on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
