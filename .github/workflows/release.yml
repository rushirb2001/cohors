name: Release

# Builds prebuilt `cohors` binaries when a version tag is pushed and attaches
# them to a (draft) GitHub Release. It does NOT publish to crates.io or any
# registry. For the full cargo-dist experience (shell/Homebrew installers,
# cargo-binstall metadata), run `dist init` to regenerate this from the
# [workspace.metadata.dist] config in Cargo.toml.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p cohors-tui --target ${{ matrix.target }}
      - name: Package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          dir="target/$TARGET/release"
          tar -C "$dir" -czf "cohors-$TARGET.tar.gz" cohors
      - name: Attach to release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: cohors-${{ matrix.target }}.tar.gz
          draft: true
