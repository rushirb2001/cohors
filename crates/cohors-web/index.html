<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cohors — your git fleet at a glance</title>
    <!-- Fonts (Google Fonts CDN): Google Sans + IBM Plex Sans for the UI,
         Google Sans Code + IBM Plex Mono for the data/code. Fetched dynamically
         so distribution stays a single static bundle (no font files to ship);
         the family stacks in style.css fall back to system fonts if offline. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Code:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />
    <link data-trunk rel="css" href="style.css" />
  </head>
  <body></body>
</html>
